name: Build and Release prohelp

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build Binary
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact_name: prohelp-linux
            target_path: prohelp
          - os: windows-latest
            artifact_name: prohelp-windows.exe
            target_path: prohelp.exe
          - os: macos-latest
            artifact_name: prohelp-macos
            target_path: prohelp

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Dlang compiler
        uses: dlang-community/setup-dlang@v1
        with:
          compiler: ldc-latest

      - name: Build executable
        run: dub build -c executable --build=release

      - name: Rename binary for release
        run: |
          mv ${{ matrix.target_path }} ${{ matrix.artifact_name }}
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/prohelp-linux
            release-assets/prohelp-windows.exe
            release-assets/prohelp-macos
          draft: false
          prerelease: false
          body: |
            ## Prohelp Release
            
            Welcome to the new release of **Prohelp**!
            
            ### Download Binaries
            - **Linux:** `prohelp-linux`
            - **Windows:** `prohelp-windows.exe`
            - **macOS:** `prohelp-macos`
            
            Please refer to the [CHANGELOG.md](https://github.com/dev-centr/prohelp/blob/main/CHANGELOG.md) for full details of changes.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
